<svg viewBox="0 0 200 140" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="pf-ap-a" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <polygon points="0,0 6,2 0,4" fill="#ccc"/>
    </marker>
  </defs>

  <!-- Obstacle: barely visible initially, discovered when robot reaches node 1 -->
  <g opacity="0.07">
    <animate attributeName="opacity" values="0.07;0.07;0.85;0.85"
             keyTimes="0;0.30;0.34;1" dur="10s" repeatCount="indefinite"/>
    <polygon points="105,18 150,14 168,42 156,66 125,58 108,34"
             fill="#e0e0e0" stroke="#bbb" stroke-width="1.5" stroke-linejoin="round"/>
    <text x="138" y="42" text-anchor="middle" font-size="7" fill="#aaa" font-family="sans-serif">obstacle</text>
  </g>

  <!-- Perception circle: always visible, follows robot -->
  <circle r="100" fill="hsl(204,86%,96%)" fill-opacity="0.25"
          stroke="hsl(204,86%,75%)" stroke-width="1.5" stroke-dasharray="5,4">
    <animate attributeName="cx" values="28;28;100;100;125;125;125;28;28"
             keyTimes="0;0.19;0.28;0.49;0.57;0.66;0.84;0.85;1" dur="10s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="110;110;55;55;88;88;88;110;110"
             keyTimes="0;0.19;0.28;0.49;0.57;0.66;0.84;0.85;1" dur="10s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;1"
         keyTimes="0;1" dur="10s" repeatCount="indefinite"/>
  </circle>

  <!-- Phase 1 edges (boundary-to-boundary so arrows land at node borders) -->
  <!-- S(28,110,r=8) → 1(100,55,r=7) -->
  <line x1="34" y1="105" x2="94" y2="59" stroke="#ddd" stroke-width="1.5" marker-end="url(#pf-ap-a)" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.06;0.08;1" dur="10s" repeatCount="indefinite"/>
  </line>
  <!-- S(28,110,r=8) → 2(50,82,r=7) -->
  <line x1="33" y1="104" x2="46" y2="88" stroke="#ddd" stroke-width="1.5" marker-end="url(#pf-ap-a)" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.08;0.10;1" dur="10s" repeatCount="indefinite"/>
  </line>
  <!-- 1(100,55,r=7) → 2(50,82,r=7) -->
  <line x1="94" y1="58" x2="56" y2="79" stroke="#ddd" stroke-width="1.5" marker-end="url(#pf-ap-a)" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.10;0.12;1" dur="10s" repeatCount="indefinite"/>
  </line>

  <!-- Phase 2 edges (appear after obstacle discovery at node 1) -->
  <!-- 1(100,55,r=7) → 3(125,88,r=7) -->
  <line x1="104" y1="61" x2="121" y2="82" stroke="#ddd" stroke-width="1.5" marker-end="url(#pf-ap-a)" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.36;0.38;1" dur="10s" repeatCount="indefinite"/>
  </line>
  <!-- 3(125,88,r=7) → 4(168,116,r=7) -->
  <line x1="131" y1="92" x2="162" y2="112" stroke="#ddd" stroke-width="1.5" marker-end="url(#pf-ap-a)" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.39;0.41;1" dur="10s" repeatCount="indefinite"/>
  </line>
  <!-- 2(50,82,r=7) → 3(125,88,r=7) -->
  <line x1="57" y1="83" x2="118" y2="87" stroke="#ddd" stroke-width="1.5" marker-end="url(#pf-ap-a)" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.41;0.43;1" dur="10s" repeatCount="indefinite"/>
  </line>

  <!-- Blue path 1: S → 1 → 2 (robot follows up to node 1 then stops) -->
  <path d="M28,110 L100,55 L50,82" fill="none" stroke="hsl(204,86%,53%)" stroke-width="2.5" stroke-linecap="round" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.14;0.16;0.44;0.46;1" dur="10s" repeatCount="indefinite"/>
  </path>

  <!-- Blue path 2: 1 → 3 → 4 (replanned, routes below obstacle) -->
  <path d="M100,55 L125,88 L168,116" fill="none" stroke="hsl(204,86%,53%)" stroke-width="2.5" stroke-linecap="round" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.46;0.48;1" dur="10s" repeatCount="indefinite"/>
  </path>

  <!-- Phase 1 nodes -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.06;0.08;1" dur="10s" repeatCount="indefinite"/>
    <circle cx="100" cy="55" r="7" fill="hsl(204,86%,90%)" stroke="hsl(204,86%,53%)" stroke-width="1.5"/>
    <text x="100" y="58" text-anchor="middle" font-size="8" font-weight="bold" fill="#333" font-family="sans-serif">4</text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.08;0.10;1" dur="10s" repeatCount="indefinite"/>
    <circle cx="50" cy="82" r="7" fill="hsl(204,86%,90%)" stroke="hsl(204,86%,53%)" stroke-width="1.5"/>
    <text x="50" y="85" text-anchor="middle" font-size="8" font-weight="bold" fill="#333" font-family="sans-serif">3</text>
  </g>

  <!-- Phase 2 nodes -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.36;0.38;1" dur="10s" repeatCount="indefinite"/>
    <circle cx="125" cy="88" r="7" fill="hsl(204,86%,90%)" stroke="hsl(204,86%,53%)" stroke-width="1.5"/>
    <text x="125" y="91" text-anchor="middle" font-size="8" font-weight="bold" fill="#333" font-family="sans-serif">5</text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.39;0.41;1" dur="10s" repeatCount="indefinite"/>
    <circle cx="168" cy="116" r="7" fill="hsl(204,86%,90%)" stroke="hsl(204,86%,53%)" stroke-width="1.5"/>
    <text x="168" y="119" text-anchor="middle" font-size="8" font-weight="bold" fill="#333" font-family="sans-serif">2</text>
  </g>

  <!-- Start node -->
  <g>
    <animate attributeName="opacity" values="1;1" keyTimes="0;1" dur="10s" repeatCount="indefinite"/>
    <circle cx="28" cy="110" r="8" fill="#fff" stroke="#666" stroke-width="2"/>
    <text x="28" y="114" text-anchor="middle" font-size="9" font-weight="bold" fill="#333" font-family="sans-serif">0</text>
    <text x="28" y="128" text-anchor="middle" font-size="8" fill="#999" font-family="sans-serif" font-style="italic">start</text>
    <text x="100" y="134" text-anchor="middle" font-size="8" fill="#aaa" font-family="sans-serif">node label = gain</text>
  </g>

  <!-- Robot dot -->
  <circle r="5" fill="hsl(204,86%,53%)" stroke="#fff" stroke-width="1.5">
    <animate attributeName="cx" values="28;28;100;100;125;125;125;28;28"
             keyTimes="0;0.19;0.28;0.49;0.57;0.66;0.84;0.85;1" dur="10s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="110;110;55;55;88;88;88;110;110"
             keyTimes="0;0.19;0.28;0.49;0.57;0.66;0.84;0.85;1" dur="10s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;1" keyTimes="0;1" dur="10s" repeatCount="indefinite"/>
  </circle>

  <!-- Single end-stage decay: one shape takes over the full scene -->
  <circle cx="100" cy="70" r="170" fill="#fff" opacity="0">
    <animate attributeName="opacity" values="0;0;1.02;1.0" keyTimes="0;0.74;0.85;1" dur="10s" repeatCount="indefinite"/>
  </circle>
</svg>
