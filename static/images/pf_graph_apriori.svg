<svg viewBox="0 0 200 140" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="pf1-a" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <polygon points="0,0 6,2 0,4" fill="#ccc"/>
    </marker>
  </defs>

  <!-- Graph known a priori: always visible -->
  <g>
    <line x1="38" y1="101" x2="153" y2="109" stroke="#ddd" stroke-width="1.5" marker-end="url(#pf1-a)"/>
    <line x1="35" y1="93" x2="76" y2="36" stroke="#ddd" stroke-width="1.5" marker-end="url(#pf1-a)"/>
    <line x1="87" y1="30" x2="153" y2="30" stroke="#ddd" stroke-width="1.5" marker-end="url(#pf1-a)"/>
    <line x1="160" y1="37" x2="160" y2="103" stroke="#ddd" stroke-width="1.5" marker-end="url(#pf1-a)"/>
    <line x1="37" y1="96" x2="154" y2="33" stroke="#ddd" stroke-width="1.5" marker-end="url(#pf1-a)"/>
    <line x1="85" y1="35" x2="155" y2="105" stroke="#ddd" stroke-width="1.5" marker-end="url(#pf1-a)"/>
    <circle cx="80" cy="30" r="7" fill="#e8f4fd" stroke="#666" stroke-width="1.5"/>
    <text x="80" y="33" text-anchor="middle" font-size="8" font-weight="bold" fill="#333" font-family="sans-serif">3</text>
    <circle cx="160" cy="30" r="7" fill="#e8f4fd" stroke="#666" stroke-width="1.5"/>
    <text x="160" y="33" text-anchor="middle" font-size="8" font-weight="bold" fill="#333" font-family="sans-serif">5</text>
    <circle cx="160" cy="110" r="7" fill="#e8f4fd" stroke="#666" stroke-width="1.5"/>
    <text x="160" y="113" text-anchor="middle" font-size="8" font-weight="bold" fill="#333" font-family="sans-serif">4</text>
  </g>

  <!-- Blue path overlay (planned route, appears after graph) -->
  <path d="M35,93 L76,36 M87,30 L153,30 M160,37 L160,103" fill="none" stroke="hsl(204,86%,53%)" stroke-width="2.5" stroke-linecap="round" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.06;0.13;1" dur="8s" repeatCount="indefinite"/>
  </path>

  <!-- Start node (always visible) -->
  <circle cx="30" cy="100" r="8" fill="#fff" stroke="#666" stroke-width="2"/>
  <text x="30" y="104" text-anchor="middle" font-size="9" font-weight="bold" fill="#333" font-family="sans-serif">0</text>
  <text x="30" y="118" text-anchor="middle" font-size="8" fill="#999" font-family="sans-serif" font-style="italic">start</text>
  <text x="100" y="134" text-anchor="middle" font-size="8" fill="#aaa" font-family="sans-serif">node label = gain</text>

  <!-- Robot dot -->
  <circle r="5" fill="hsl(204,86%,53%)" stroke="#fff" stroke-width="1.5">
    <animate attributeName="cx" values="30;30;80;80;160;160;160;160" keyTimes="0;0.19;0.38;0.44;0.63;0.69;0.88;1" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="100;100;30;30;30;30;110;110" keyTimes="0;0.19;0.38;0.44;0.63;0.69;0.88;1" dur="8s" repeatCount="indefinite"/>
  </circle>

  <!-- White fade -->
  <circle cx="100" cy="70" r="170" fill="#fff" opacity="0">
    <animate attributeName="opacity" values="0;0;1.02;1.0" keyTimes="0;0.90;0.97;1" dur="8s" repeatCount="indefinite"/>
  </circle>
</svg>
